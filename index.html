<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>asungood — Mockup Remera Oversize</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Dancing+Script:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #D6D3CA;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 24px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 64px;
    }
    .brand-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 8px;
      color: #111;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #777;
      font-weight: 400;
    }

    .mockup-grid {
      display: flex;
      gap: 64px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .view {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .view-label {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #555;
      font-weight: 500;
    }

    .tshirt-wrap {
      filter: drop-shadow(0 20px 50px rgba(0,0,0,0.22))
              drop-shadow(0 4px 14px rgba(0,0,0,0.12));
    }

    .note {
      margin-top: 72px;
      font-size: 10px;
      letter-spacing: 2px;
      color: #999;
      text-transform: uppercase;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div class="brand-logo">ASUNGOOD</div>
    <div class="subtitle">Remera Oversize &mdash; Mockup</div>
  </header>

  <div class="mockup-grid">

    <!-- ════════════ FRENTE ════════════ -->
    <div class="view">
      <span class="view-label">Frente</span>
      <div class="tshirt-wrap">
        <svg width="360" height="450" viewBox="0 0 400 490" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- Remera blanca con gradiente sutil para volumen -->
            <linearGradient id="shirtWhiteF" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#E8E8E8"/>
              <stop offset="20%"  stop-color="#F8F8F8"/>
              <stop offset="50%"  stop-color="#FFFFFF"/>
              <stop offset="80%"  stop-color="#F5F5F5"/>
              <stop offset="100%" stop-color="#EBEBEB"/>
            </linearGradient>
            <!-- Sombra interna en mangas -->
            <linearGradient id="sleeveShadeL" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"  stop-color="#D0D0D0" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="sleeveShadeR" x1="100%" y1="0%" x2="0%" y2="0%">
              <stop offset="0%"  stop-color="#D0D0D0" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
            </linearGradient>
          </defs>

          <!-- Silueta cuerpo remera oversize -->
          <path d="
            M 162,42
            C 170,26 190,20 200,20
            C 210,20 230,26 238,42
            L 345,80
            L 382,175
            L 315,192
            L 315,462
            L 85,462
            L 85,192
            L 18,175
            L 55,80
            Z
          " fill="url(#shirtWhiteF)" stroke="#CECECE" stroke-width="1"/>

          <!-- Cuello redondo -->
          <path d="M 162,42 C 168,72 183,84 200,86 C 217,84 232,72 238,42"
                fill="#F0F0F0" stroke="#CECECE" stroke-width="1"/>

          <!-- Pliegue de tela sutil en cuerpo -->
          <line x1="200" y1="120" x2="197" y2="462" stroke="#E0E0E0" stroke-width="1.5" opacity="0.7"/>

          <!-- Sombra bajo manga izquierda -->
          <path d="M 18,175 L 85,192 L 85,220 L 18,200 Z" fill="url(#sleeveShadeL)" opacity="0.4"/>
          <!-- Sombra bajo manga derecha -->
          <path d="M 382,175 L 315,192 L 315,220 L 382,200 Z" fill="url(#sleeveShadeR)" opacity="0.4"/>

          <!-- ─── LOGO FRENTE negro, pecho centrado ─── -->
          <g transform="translate(200, 215)">

            <!-- Línea 1: ASUN -->
            <text
              x="0" y="-22"
              font-family="'Bebas Neue', 'Arial Black', Impact, sans-serif"
              font-size="44"
              fill="#111111"
              text-anchor="middle"
              letter-spacing="3"
            >ASUN</text>

            <!-- G -->
            <text
              x="-72" y="18"
              font-family="'Bebas Neue', 'Arial Black', Impact, sans-serif"
              font-size="44"
              fill="#111111"
              text-anchor="middle"
            >G</text>

            <!-- Flor 1 -->
            <g transform="translate(-28, 0)">
              <ellipse rx="11" ry="5"   fill="#111111" transform="rotate(0)"/>
              <ellipse rx="8"  ry="3.5" fill="#111111" transform="rotate(45)"/>
              <ellipse rx="11" ry="5"   fill="#111111" transform="rotate(90)"/>
              <ellipse rx="8"  ry="3.5" fill="#111111" transform="rotate(135)"/>
              <circle r="5"   fill="#FFFFFF"/>
              <circle r="2.5" fill="#111111"/>
            </g>

            <!-- Flor 2 -->
            <g transform="translate(18, 0)">
              <ellipse rx="11" ry="5"   fill="#111111" transform="rotate(0)"/>
              <ellipse rx="8"  ry="3.5" fill="#111111" transform="rotate(45)"/>
              <ellipse rx="11" ry="5"   fill="#111111" transform="rotate(90)"/>
              <ellipse rx="8"  ry="3.5" fill="#111111" transform="rotate(135)"/>
              <circle r="5"   fill="#FFFFFF"/>
              <circle r="2.5" fill="#111111"/>
            </g>

            <!-- D -->
            <text
              x="66" y="18"
              font-family="'Bebas Neue', 'Arial Black', Impact, sans-serif"
              font-size="44"
              fill="#111111"
              text-anchor="middle"
            >D</text>

          </g>

        </svg>
      </div>
      <span class="view-label" style="color:#999; font-size:9px; letter-spacing:2px;">Logo pecho centrado</span>
    </div>

    <!-- ════════════ ESPALDA ════════════ -->
    <div class="view">
      <span class="view-label">Espalda</span>
      <div class="tshirt-wrap">
        <svg width="360" height="450" viewBox="0 0 400 490" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="shirtWhiteB" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#EBEBEB"/>
              <stop offset="20%"  stop-color="#F5F5F5"/>
              <stop offset="50%"  stop-color="#FFFFFF"/>
              <stop offset="80%"  stop-color="#F8F8F8"/>
              <stop offset="100%" stop-color="#E8E8E8"/>
            </linearGradient>
            <linearGradient id="sleeveShadeLB" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"  stop-color="#D0D0D0" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="sleeveShadeRB" x1="100%" y1="0%" x2="0%" y2="0%">
              <stop offset="0%"  stop-color="#D0D0D0" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
            </linearGradient>
          </defs>

          <!-- Silueta espalda -->
          <path d="
            M 162,42
            C 170,26 190,20 200,20
            C 210,20 230,26 238,42
            L 345,80
            L 382,175
            L 315,192
            L 315,462
            L 85,462
            L 85,192
            L 18,175
            L 55,80
            Z
          " fill="url(#shirtWhiteB)" stroke="#CECECE" stroke-width="1"/>

          <!-- Cuello espalda (más cerrado/alto) -->
          <path d="M 162,42 C 168,54 183,61 200,62 C 217,61 232,54 238,42"
                fill="#F0F0F0" stroke="#CECECE" stroke-width="1"/>

          <!-- Pliegue central sutil -->
          <line x1="200" y1="90" x2="197" y2="462" stroke="#E0E0E0" stroke-width="1.5" opacity="0.7"/>

          <path d="M 18,175 L 85,192 L 85,220 L 18,200 Z" fill="url(#sleeveShadeLB)" opacity="0.4"/>
          <path d="M 382,175 L 315,192 L 315,220 L 382,200 Z" fill="url(#sleeveShadeRB)" opacity="0.4"/>

          <!-- ─── DISEÑO ESPALDA: "La Vida es 1" ─── -->
          <!--
            Script caligráfico en azul teal, centrado en espalda
            Color: #1089B5 (teal azul del diseño original)
          -->

          <!-- "La" -->
          <text
            x="200" y="210"
            font-family="'Dancing Script', 'Brush Script MT', cursive"
            font-size="72"
            font-weight="700"
            fill="#1089B5"
            text-anchor="middle"
          >La</text>

          <!-- "Vida" -->
          <text
            x="200" y="295"
            font-family="'Dancing Script', 'Brush Script MT', cursive"
            font-size="82"
            font-weight="700"
            fill="#1089B5"
            text-anchor="middle"
          >Vida</text>

          <!-- "es 1" -->
          <text
            x="200" y="378"
            font-family="'Dancing Script', 'Brush Script MT', cursive"
            font-size="72"
            font-weight="700"
            fill="#1089B5"
            text-anchor="middle"
          >es 1</text>

        </svg>
      </div>
      <span class="view-label" style="color:#999; font-size:9px; letter-spacing:2px;">Diseño espalda</span>
    </div>

  </div>

  <p class="note">asungood &mdash; 2025</p>

</body>
</html>
